<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Media In HTML</title>
    </head>
    <body>
        <h1>My Edits🔥</h1>

        <video
            src="Butcher_edit.mp4"
            height="170"
            controls
            autoplay
            loop
        ></video>

        <video
            src="elliot_edit.mp4"
            height="170"
            controls
            autoplay
            loop
            style="margin-left: 20px"
        ></video>
        <video
            src="spider_man_edit.mp4"
            height="170"
            controls
            autoplay
            loop
            poster="spider_man_thumbnail.jpg"
        ></video>
        <video
            src="tv_shows_edit.mp4"
            height="170"
            controls
            autoplay
            loop
            poster="thumbnail.jpg"
            style="margin-left: 20px"
        ></video>

        <h1>Phonk Collection</h1>
        <h3>MONTAGEM_FEARLESS_ULTRA_SLOWED</h3>
        <audio
            src="MONTAGEM_FEARLESS_ULTRA_SLOWED(256k).mp3"
            controls
            autoplay
            loop
        ></audio>
        <h3>NATI_NATI_Slowed</h3>
        <audio
            src="NATI_NATI__Slowed__-_TRVXER,_0ketaminxe(256k).mp3"
            controls
            autoplay
            loop
        ></audio>
        <h3>ZOMANA_Slowed</h3>
        <audio src="ZOMANA__Slowed_(256k).mp3" controls autoplay loop></audio>
        <h1>SVG in Html</h1>
        <img src="circle.svg" alt="Circle" />
        <h1>Use of Iframe</h1>
        <iframe src="about_me.html" width="200" height="200"> </iframe>
        <h1>You Tube video</h1>
        <iframe
            width="300"
            height="200"
            src="https://www.youtube.com/embed/zoT9zpScI5g?si=DKXCf2okx4NPAjCd&amp;start=20"
            title="YouTube video player"
            frameborder="0"
            allow="
                accelerometer;
                autoplay;
                clipboard-write;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share;
            "
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
        ></iframe>
    </body>
</html>
