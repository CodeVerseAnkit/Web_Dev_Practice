<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CSS Selectors</title>
        <link rel="stylesheet" href="selector.css" />
    </head>
    <body>
        <h1>CSS Selectors</h1>
        <div class="red">Class Selector</div>
        <div id="green">ID Selectors</div>
        <div>
            <span> <p>Child Selector</p> </span>
        </div>
        <div>
            <span>
                <p>Desendent Selector</p>
            </span>
        </div>
        <a href="https://www.google.com">Go to Google</a>
<br>
        <label form="email">Enter Your Email: </label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
        />
    </body>
</html>
